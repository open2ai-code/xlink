name: 🐛 Bug Report
description: Create a report to help us improve
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        感谢您花时间填写此Bug报告！

  - type: dropdown
    id: platform
    attributes:
      label: Platform / 平台
      description: What platform are you using? / 您使用的是什么平台？
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: XLink Version / XLink版本
      description: What version of XLink are you running? / 您运行的是哪个版本的XLink？
      placeholder: e.g., v1.0.0
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version / Python版本
      description: What version of Python are you using? / 您使用的是哪个版本的Python？
      placeholder: e.g., 3.10.5
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug / Bug描述
      description: A clear and concise description of what the bug is. / 清晰简洁地描述这个Bug。
      placeholder: Tell us what happened... / 告诉我们发生了什么...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: Steps to reproduce the behavior. / 复现此行为的步骤。
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 预期行为
      description: A clear and concise description of what you expected to happen. / 清晰简洁地描述您期望发生的事情。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际行为
      description: What actually happened? / 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / 截图
      description: If applicable, add screenshots to help explain your problem. / 如果适用，添加截图以帮助解释您的问题。
      placeholder: Drag and drop images here... / 将图片拖放到此处...

  - type: textarea
    id: logs
    attributes:
      label: Log Output / 日志输出
      description: Please copy and paste any relevant log output. / 请复制粘贴任何相关的日志输出。
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 其他上下文
      description: Add any other context about the problem here. / 在此添加有关问题的任何其他上下文。
