name: 💡 Feature Request
description: Suggest an idea for this project
title: "[Feature] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
        感谢您花时间提出新功能建议！

  - type: dropdown
    id: feature-type
    attributes:
      label: Feature Type / 功能类型
      description: What type of feature is this? / 这是什么类型的功能？
      options:
        - UI/UX Improvement
        - New Feature
        - Performance Optimization
        - Security Enhancement
        - Developer Experience
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? / 您的功能请求是否与问题相关？
      description: A clear and concise description of what the problem is. / 清晰简洁地描述这个问题是什么。
      placeholder: I'm always frustrated when... / 我总是感到沮丧，当...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like / 描述您想要的解决方案
      description: A clear and concise description of what you want to happen. / 清晰简洁地描述您希望发生的事情。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered / 描述您考虑过的替代方案
      description: A clear and concise description of any alternative solutions or features you've considered. / 清晰简洁地描述您考虑过的任何替代解决方案或功能。

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / 使用场景
      description: Describe a specific use case or scenario where this feature would be useful. / 描述此功能会有用的具体使用场景或情况。
      placeholder: As a user, I want to... / 作为用户，我想要...

  - type: textarea
    id: mockups
    attributes:
      label: Mockups or Examples / 模型或示例
      description: If applicable, add mockups, screenshots, or examples to help illustrate your idea. / 如果适用，添加模型、截图或示例以帮助说明您的想法。

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 其他上下文
      description: Add any other context or screenshots about the feature request here. / 在此添加有关功能请求的任何其他上下文或截图。

  - type: dropdown
    id: priority
    attributes:
      label: Priority / 优先级
      description: How important is this feature to you? / 这个功能对您有多重要？
      options:
        - Low - Nice to have / 低 - 有更好
        - Medium - Would be helpful / 中 - 会有帮助
        - High - Critical for my workflow / 高 - 对我的工作流程至关重要
    validations:
      required: true
