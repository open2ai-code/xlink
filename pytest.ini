[pytest]
# pytest配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记
markers =
    p0: P0核心功能测试 (必须通过)
    p1: P1重要功能测试
    p2: P2增强体验测试
    p3: P3边界情况测试
    slow: 慢速测试

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 日志
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
